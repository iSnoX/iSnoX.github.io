<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>Submit Nade - CS2 Nades</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0e1013;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .form-container {
            width: 400px;
            background: #171a21;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #222731;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 0.85rem; color: #8f9cae; font-weight: bold; }
        input, select, textarea {
            background: #121418;
            border: 1px solid #2a303d;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .map-preview-container {
            flex: 1;
            background: #121418;
            border: 1px solid #222731;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .radar-box {
            position: relative;
            display: inline-block;
            cursor: crosshair;
        }
        .radar-img {
            height: 70vh;
            width: auto;
            border-radius: 12px;
        }
        .pin {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid #fff;
        }
        .target-pin-preview { background: #ffb400; color: #000; }
        .throw-pin-preview { background: #3b82f6; color: #fff; }
        .submit-btn {
            background: #ffb400;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #e09e00; }
        .mode-btn-container { display: flex; gap: 8px; }
        .mode-btn {
            flex: 1; padding: 8px; background: #2a303d; color: #fff;
            border: none; border-radius: 6px; cursor: pointer;
        }
        .mode-btn.active { background: #ffb400; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>+ Neue Nade hinzufügen</h2>

        <div class="form-group">
            <label>Map auswählen</label>
            <select id="map-select" onchange="changeMapRadar()">
                <option value="cache.json" data-img="assets/images/cache-radar.webp">Cache</option>
                <option value="mirage.json" data-img="assets/images/mirage-radar.webp">Mirage</option>
                <option value="dust2.json" data-img="assets/images/dust2-radar.webp">Dust 2</option>
                <option value="inferno.json" data-img="assets/images/inferno-radar.webp">Inferno</option>
            </select>
        </div>

        <div class="form-group">
            <label>Titel der Nade</label>
            <input type="text" id="title" placeholder="z. B. Cache Smoke: Back A Site">
        </div>

        <div class="form-group">
            <label>Typ</label>
            <select id="type">
                <option value="smoke">💨 Smoke</option>
                <option value="molotov">🔥 Molotov</option>
                <option value="flash">⚡ Flashbang</option>
                <option value="he">💣 HE Grenade</option>
            </select>
        </div>

        <div class="form-group">
            <label>Seite</label>
            <select id="side">
                <option value="T">T Site</option>
                <option value="CT">CT Site</option>
            </select>
        </div>

        <div class="form-group">
            <label>Wurf-Position (Von wo?)</label>
            <input type="text" id="from" placeholder="z. B. Outside Garage">
        </div>

        <div class="form-group">
            <label>Wurf-Technik</label>
            <input type="text" id="technique" placeholder="z. B. Jump Throw, Standing">
        </div>

        <div class="form-group">
            <label>Klick-Modus auf dem Radar</label>
            <div class="mode-btn-container">
                <button type="button" class="mode-btn active" id="btn-target" onclick="setClickMode('target')">1. Zielort setzen</button>
                <button type="button" class="mode-btn" id="btn-throw" onclick="setClickMode('throw')">2. Abwurf ort setzen</button>
            </div>
        </div>

        <div class="form-group">
            <label>Screenshot / Video hochladen</label>
            <input type="file" id="screenshot-file" accept="image/*">
        </div>

        <button type="button" class="submit-btn" onclick="handleSubmit()">🚀 Auf GitHub veröffentlichen</button>
        <button type="button" style="background:transparent; border:none; color:#8f9cae; cursor:pointer; text-decoration:underline;" onclick="resetGitHubToken()">Token zurücksetzen</button>
    </div>

    <div class="map-preview-container">
        <h3>Klicke auf die Karte für Zielort & Abwurfort</h3>
        <div class="radar-box" id="radar-box" onclick="handleRadarClick(event)">
            <img src="assets/images/cache-radar.webp" id="radar-img" class="radar-img">
        </div>
    </div>

    <script src="submit.js"></script>
    <script>
        let clickMode = 'target';
        let targetPos = null;
        let throwPos = null;

        function setClickMode(mode) {
            clickMode = mode;
            document.getElementById('btn-target').classList.toggle('active', mode === 'target');
            document.getElementById('btn-throw').classList.toggle('active', mode === 'throw');
        }

        function changeMapRadar() {
            const select = document.getElementById('map-select');
            const selectedOption = select.options[select.selectedIndex];
            document.getElementById('radar-img').src = selectedOption.getAttribute('data-img');
            targetPos = null;
            throwPos = null;
            renderPreviewPins();
        }

        function handleRadarClick(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const left = Math.round(((e.clientX - rect.left) / rect.width) * 1000) / 10;
            const top = Math.round(((e.clientY - rect.top) / rect.height) * 1000) / 10;

            if (clickMode === 'target') {
                targetPos = { top, left };
                setClickMode('throw'); // Automatisch zum Abwurfort wechseln
            } else {
                throwPos = { top, left };
            }
            renderPreviewPins();
        }

        function renderPreviewPins() {
            document.querySelectorAll('.pin').forEach(p => p.remove());
            const box = document.getElementById('radar-box');

            if (targetPos) {
                const pin = document.createElement('div');
                pin.className = 'pin target-pin-preview';
                pin.style.top = targetPos.top + '%';
                pin.style.left = targetPos.left + '%';
                pin.innerText = '🎯';
                box.appendChild(pin);
            }

            if (throwPos) {
                const pin = document.createElement('div');
                pin.className = 'pin throw-pin-preview';
                pin.style.top = throwPos.top + '%';
                pin.style.left = throwPos.left + '%';
                pin.innerText = '🏃';
                box.appendChild(pin);
            }
        }

        async function handleSubmit() {
            const mapJson = document.getElementById('map-select').value;
            const title = document.getElementById('title').value;
            const type = document.getElementById('type').value;
            const side = document.getElementById('side').value;
            const from = document.getElementById('from').value;
            const technique = document.getElementById('technique').value;
            const fileInput = document.getElementById('screenshot-file');

            if (!title || !from || !targetPos || !throwPos || fileInput.files.length === 0) {
                return alert("Bitte fülle alle Felder aus, wähle Ziel- & Abwurfort auf dem Radar und füge ein Bild an!");
            }

            try {
                // 1. Screenshot auf GitHub hochladen
                const file = fileInput.files[0];
                const uploadedImagePath = await uploadImageToGitHub(file);

                // 2. Nade-Objekt bauen
                const newNade = {
                    id: "target-" + Date.now(),
                    title: title,
                    type: type,
                    targetPosition: targetPos,
                    throws: [{
                        side: side,
                        from: from,
                        technique: technique,
                        imageUrl: uploadedImagePath,
                        throwPosition: throwPos
                    }]
                };

                // 3. Auf GitHub in der JSON-Datei speichern
                await saveNadeToGitHub(mapJson, newNade);

            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
