<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>Overpass - CS2 Nades</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0e1013;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* Linke Seitenleiste */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #171a21;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border: 1px solid #222731;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .back-link {
            color: #8f9cae;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        .map-header h1 {
            margin: 5px 0 0 0;
            font-size: 1.8rem;
        }

        .filter-box {
            background: #1e222d;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #2a303d;
        }

        .filter-title {
            font-size: 0.75rem;
            color: #8f9cae;
            text-transform: uppercase;
            font-weight: bold;
            padding: 8px 12px;
        }

        .filter-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 4px;
            background: transparent;
            color: #c3cddb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: left;
        }
        .filter-btn:hover { background: #282e3d; color: #fff; }
        .filter-btn.active { background: #2e3547; color: #fff; }

        .badge {
            background: #121418;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #8f9cae;
        }

        .submit-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 12px 14px;
            background: #ffb400;
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .submit-btn:hover { background: #e09e00; transform: translateY(-1px); }

        /* Rechter Radar-Bereich */
        .map-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #121418;
            border: 1px solid #222731;
            border-radius: 16px;
            padding: 20px;
            height: calc(100vh - 40px);
            position: relative;
        }

        .radar-box {
            position: relative;
            display: inline-block;
        }

        .radar-img {
            height: 70vh;
            width: auto;
            max-width: 100%;
            display: block;
            border-radius: 12px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }

        /* Target Pins auf dem Radar */
        .target-pin {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #ffb400;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            transition: transform 0.2s ease;
            z-index: 5;
        }
        .target-pin:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 10;
        }

        /* Abwurf-Pin direkt auf dem Haupt-Radar */
        .throw-pin {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.9);
            transition: transform 0.2s ease;
            z-index: 5;
        }
        .throw-pin:hover {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 10;
        }

        .radar-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .reset-view-btn {
            background: #2a303d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background 0.2s;
        }
        .reset-view-btn:hover { background: #3b4252; }

        /* Pop-up Modal nur für das Video */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: #171a21;
            border: 1px solid #2a303d;
            border-radius: 16px;
            width: 90vw;
            height: 90vh;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.95);
            position: relative;
        }

        .modal-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #8f9cae;
            font-size: 1.8rem;
            line-height: 1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { color: #fff; background: rgba(255, 255, 255, 0.2); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .throw-option {
            background: #1e222d;
            border: 1px solid #2a303d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .throw-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .technique-badge {
            background: #ffb400;
            color: #000;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 60vh;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- Linke Seitenleiste -->
    <aside class="sidebar">
        <div>
            <a href="index.html" class="back-link">← Zurück zur Übersicht</a>
            <div class="map-header">
                <h1 id="map-name-heading">Overpass</h1>
            </div>
        </div>

        <!-- Filter-Boxen -->
        <div class="filter-box">
            <div class="filter-title">Nades</div>
            <button class="filter-btn active">
                <span>💨 Smokes</span>
                <span class="badge" id="smoke-count">0</span>
            </button>
            <button class="filter-btn">
                <span>🔥 Molotovs</span>
                <span class="badge" id="molotov-count">0</span>
            </button>
            <button class="filter-btn">
                <span>⚡ Flashbangs</span>
                <span class="badge" id="flash-count">0</span>
            </button>
            <button class="filter-btn">
                <span>💣 HE Grenades</span>
                <span class="badge" id="he-count">0</span>
            </button>
        </div>

        <a href="submit.html" class="submit-btn">+ Submit Nade</a>

        <div class="filter-box">
            <div class="filter-title">Maps</div>
            <a href="cache.html" class="filter-btn" style="text-decoration:none;">Cache</a>
            <a href="mirage.html" class="filter-btn" style="text-decoration:none;">Mirage</a>
            <a href="dust2.html" class="filter-btn" style="text-decoration:none;">Dust 2</a>
            <a href="inferno.html" class="filter-btn" style="text-decoration:none;">Inferno</a>
            <a href="ancient.html" class="filter-btn" style="text-decoration:none;">Ancient</a>
            <a href="anubis.html" class="filter-btn" style="text-decoration:none;">Anubis</a>
            <a href="overpass.html" class="filter-btn" style="text-decoration:none;">Overpass</a>
        </div>
    </aside>

    <!-- Radar-Bereich (Hauptfenster) -->
    <main class="map-container">
        <div class="radar-box" id="radar-box">
            <img src="assets/images/overpass-radar.webp" alt="Map Radar" class="radar-img" id="radar-img">
        </div>
        <div class="radar-controls">
            <button class="reset-view-btn" id="reset-btn" onclick="resetRadarView()">← Zurück zu allen Zielorten</button>
        </div>
    </main>

    <!-- Modal Fenster nur für Video -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header-area">
                <h2 id="modal-title" style="margin:0; color:#ffb400; font-size:1.5rem;">Wurf-Video</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-content"></div>
        </div>
    </div>

    <script>
        const nadesData = [
            /* Beispiel-Eintrag für Overpass:
            {
                id: "target-1",
                title: "Overpass Smoke: Heaven",
                type: "smoke", 
                targetPosition: { top: 40.0, left: 50.0 },
                throws: [
                    {
                        from: "A Long",
                        technique: "Jump Throw",
                        videoUrl: "assets/videos/overpass-heaven-smoke.mp4",
                        throwPosition: { top: 80.0, left: 30.0 }
                    }
                ]
            }
            */
        ];

        const radarBox = document.getElementById('radar-box');
        const resetBtn = document.getElementById('reset-btn');

        function renderTargetPins() {
            document.querySelectorAll('.target-pin, .throw-pin').forEach(p => p.remove());
            resetBtn.style.display = 'none';

            let smokeCount = 0, molotovCount = 0, flashCount = 0, heCount = 0;

            nadesData.forEach(nade => {
                if (nade.type === 'smoke') smokeCount++;
                if (nade.type === 'molotov') molotovCount++;
                if (nade.type === 'flash') flashCount++;
                if (nade.type === 'he') heCount++;

                const pin = document.createElement('div');
                pin.className = 'target-pin';
                pin.style.top = nade.targetPosition.top + '%';
                pin.style.left = nade.targetPosition.left + '%';
                pin.innerText = nade.throws.length;
                pin.title = `${nade.title} (${nade.throws.length} Wurfoptionen)`;

                pin.onclick = () => showThrowPinsForTarget(nade);
                radarBox.appendChild(pin);
            });

            document.getElementById('smoke-count').innerText = smokeCount;
            document.getElementById('molotov-count').innerText = molotovCount;
            document.getElementById('flash-count').innerText = flashCount;
            document.getElementById('he-count').innerText = heCount;
        }

        function showThrowPinsForTarget(nade) {
            document.querySelectorAll('.target-pin').forEach(p => p.remove());

            nade.throws.forEach(t => {
                const throwPin = document.createElement('div');
                throwPin.className = 'throw-pin';
                throwPin.style.top = t.throwPosition.top + '%';
                throwPin.style.left = t.throwPosition.left + '%';
                throwPin.innerHTML = '🏃';
                throwPin.title = `Wurf von ${t.from} (${t.technique})`;

                throwPin.onclick = () => openVideoModal(nade, t);
                radarBox.appendChild(throwPin);
            });

            resetBtn.style.display = 'block';
        }

        function resetRadarView() {
            renderTargetPins();
        }

        function openVideoModal(nade, throwObj) {
            document.getElementById('modal-title').innerText = `📹 ${nade.title} (Von ${throwObj.from})`;
            const contentContainer = document.getElementById('modal-content');
            
            contentContainer.innerHTML = `
                <div class="throw-option">
                    <div class="throw-header">
                        <strong style="font-size:1.2rem; color:#fff;">🏃 Von ${throwObj.from}</strong>
                        <span class="technique-badge">${throwObj.technique}</span>
                    </div>
                    <div class="video-container">
                        <video id="active-video" controls autoplay loop muted playsinline>
                            <source src="${throwObj.videoUrl}" type="video/mp4">
                            Dein Browser unterstützt kein HTML5-Video.
                        </video>
                    </div>
                </div>
            `;

            document.getElementById('modal-overlay').classList.add('active');

            const videoEl = document.getElementById('active-video');
            if (videoEl) {
                videoEl.load();
                let playPromise = videoEl.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay blockiert:", error);
                    });
                }
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('modal-content').innerHTML = '';
        }

        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        };

        renderTargetPins();
    </script>
</body>
</html>
