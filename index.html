<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>CS2 Nades & Lineups</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* Grunddesign */
        body {
            background-color: #0e1217;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 20px 20px 100px; /* Platz für Menü links */
        }

        /* Schwebendes Menü links */
        #side-menu {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
        }

        #side-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #side-menu li {
            margin: 15px 0;
        }

        #side-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: #1c232d;
            border: 2px solid #2a3544;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
        }

        #side-menu a:hover {
            background: #ff4655; /* Valorant/CS Accent Red */
            border-color: #ff4655;
            transform: scale(1.1);
        }

        /* Nade Grid Layout */
        .nade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .nade-card {
            background: #1c232d;
            border: 1px solid #2a3544;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .nade-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: #2a3544;
        }

        .nade-info {
            padding: 15px;
        }

        .nade-info h3 {
            margin: 0 0 10px 0;
        }

        .nade-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .smoke { background: #5a6578; color: #fff; }
        .flash { background: #f59e0b; color: #000; }

        .btn-clip {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #ff4655;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .btn-clip:hover {
            background: #e03e4d;
        }
    </style>
</head>
<body>

    <!-- Schwebendes Menü links -->
    <nav id="side-menu">
        <ul>
            <li><a href="#mirage">Mirage</a></li>
            <li><a href="#inferno">Inferno</a></li>
            <li><a href="#dust2">Dust II</a></li>
            <li><a href="#anubis">Anubis</a></li>
            <li><a href="#ancient">Ancient</a></li>
        </ul>
    </nav>

    <!-- Hauptinhalt -->
    <main>
        <h1>CS2 Nades & Lineups</h1>

        <div class="nade-grid">
            <!-- NADE CARD 1 -->
            <article class="nade-card">
                <span class="nade-badge smoke">Smoke</span>
                <img src="https://via.placeholder.com/300x160?text=Mirage+Window+Smoke" alt="Mirage Window Smoke">
                <div class="nade-info">
                    <h3>Mirage - Window Smoke</h3>
                    <p><strong>Pos:</strong> T-Spawn<br><strong>Tick:</strong> Jumpthrow</p>
                    <a href="https://youtube.com" target="_blank" class="btn-clip">Video / Clip</a>
                </div>
            </article>

            <!-- NADE CARD 2 -->
            <article class="nade-card">
                <span class="nade-badge flash">Flash</span>
                <img src="https://via.placeholder.com/300x160?text=Inferno+Banana+Flash" alt="Inferno Banana Flash">
                <div class="nade-info">
                    <h3>Inferno - Banana Popflash</h3>
                    <p><strong>Pos:</strong> Car<br><strong>Tick:</strong> Normal</p>
                    <a href="https://youtube.com" target="_blank" class="btn-clip">Video / Clip</a>
                </div>
            </article>
        </div>
    </main>

</body>
</html>
