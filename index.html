<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>CS2 Nades & Lineups</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            background-color: #121418;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #ffb400; /* CS Yellow / Gold */
        }

        /* Map Grid Container */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Einzelne Map Card */
        .map-card {
            position: relative;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
            border: 2px solid #2a2e37;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }

        .map-card:hover {
            transform: translateY(-5px);
            border-color: #ffb400;
        }

        /* Dunkler Verlauf über dem Bild für Lesbarkeit */
        .map-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0.2) 70%);
            z-index: 1;
        }

        .map-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .map-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }

        .map-count {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 5px;
        }

        /* Beispiel Hintergründe (Pfade zu deinen Bildern anpassen) */
        .map-mirage { background-image: url('assets/images/mirage-bg.webp'); }
        .map-dust2  { background-image: url('assets/images/dust2-bg.webp'); }
        .map-cache  { background-image: url('assets/images/cache-bg.webp'); }
        .map-inferno { background-image: url('assets/images/inferno-bg.webp'); }
        .map-inferno { background-image: url('assets/images/ancient-bg.webp'); }
        .map-inferno { background-image: url('assets/images/anubis-bg.webp'); }
        .map-inferno { background-image: url('assets/images/overpass-bg.webp'); }
    </style>
</head>
<body>

    <h1>SnoX' & Friends Nades</h1>

    <div class="map-grid">
        <a href="mirage.html" class="map-card map-mirage">
            <div class="map-content">
                <div class="map-title">Mirage</div>
            </div>
        </a>

        <a href="dust2.html" class="map-card map-dust2">
            <div class="map-content">
                <div class="map-title">Dust 2</div>
            </div>
        </a>

        <a href="cache.html" class="map-card map-cache">
            <div class="map-content">
                <div class="map-title">Cache</div>
            </div>
        </a>

        <a href="inferno.html" class="map-card map-inferno">
            <div class="map-content">
                <div class="map-title">Inferno</div>
            </div>
        </a>
        
        <a href="ancient.html" class="map-card map-ancient">
            <div class="map-content">
                <div class="map-title">Ancient</div>
            </div>
        </a>
        
        <a href="anubis.html" class="map-card map-anubis">
            <div class="map-content">
                <div class="map-title">Anubis</div>
            </div>
        </a>
        
        <a href="overpass.html" class="map-card map-overpass">
            <div class="map-content">
                <div class="map-title">Overpass</div>
            </div>
        </a>
    </div>

</body>
</html>
