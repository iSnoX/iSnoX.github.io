<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Radar Nade Guide - Cache</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Side Navigation */
        .sidebar {
            width: 320px;
            background-color: #1a1a1e;
            border-right: 1px solid #29292e;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            z-index: 10;
        }

        .map-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .side-selector {
            display: flex;
            background: #09090a;
            border-radius: 8px;
            padding: 4px;
        }

        .side-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #a8a8b3;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .side-btn.active.t {
            background-color: #de9b35;
            color: #000;
        }

        .side-btn.active.ct {
            background-color: #5d8aa8;
            color: #fff;
        }

        .filter-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #202024;
            border: 1px solid #29292e;
            color: #c4c4cc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #29292e;
            color: #fff;
            border-color: #00b37e;
        }

        .badge {
            background: #121214;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        /* Main Radar View */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #09090a;
            position: relative;
        }

        .radar-container {
            position: relative;
            width: 800px;
            height: 800px;
            max-width: 90vh;
            max-height: 90vh;
            background-image: url('radar.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .target-pin {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #ff3b30;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.8);
            animation: pulse 2s infinite;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }

        .throw-pin {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #34c759;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.8);
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { transform: translate(-50%, -50%) scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #ff3b30;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            z-index: 8;
        }

        /* Video Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-container {
            background: #1a1a1e;
            width: 900px;
            max-width: 90%;
            border-radius: 12px;
            border: 1px solid #29292e;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px 20px;
            background: #202024;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #29292e;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a8a8b3;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .throw-option {
            background: #121214;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #29292e;
        }

        .throw-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .technique-badge {
            background: #00b37e;
            color: #000;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }

        .video-container video, .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="map-title">
            <span>de_cache</span>
        </div>

        <div class="side-selector">
            <button class="side-btn t active" id="btn-side-t" onclick="setSideFilter('T')">T-Seite</button>
            <button class="side-btn ct" id="btn-side-ct" onclick="setSideFilter('CT')">CT-Seite</button>
        </div>

        <div class="filter-box">
            <button class="filter-btn active" onclick="setNadeTypeFilter('smoke', this)">
                <span>💨 Smoke</span>
                <span class="badge" id="smoke-count">0</span>
            </button>
            <button class="filter-btn" onclick="setNadeTypeFilter('molotov', this)">
                <span>🔥 Molotov / Incendiary</span>
                <span class="badge" id="molotov-count">0</span>
            </button>
            <button class="filter-btn" onclick="setNadeTypeFilter('flash', this)">
                <span>⚡ Flashbang</span>
                <span class="badge" id="flash-count">0</span>
            </button>
            <button class="filter-btn" onclick="setNadeTypeFilter('he', this)">
                <span>💣 HE Grenade</span>
                <span class="badge" id="he-count">0</span>
            </button>
        </div>
    </div>

    <!-- Main Content / Radar View -->
    <div class="main-content">
        <div class="radar-container" id="radar-box">
            <button class="reset-btn" id="reset-btn" onclick="resetRadarView()">Zurück zu Zielpunkten</button>
        </div>
    </div>

    <!-- Video / Media Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title" style="color:#fff;">Nade Lineup</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-content">
                <!-- Dynamischer Inhalt für Video oder Bild wird hier injiziert -->
            </div>
        </div>
    </div>

    <!-- Script Section -->
    <script>
        let nadesData = [];
        let currentSide = "T";
        let currentType = "smoke";

        const radarBox = document.getElementById('radar-box');
        const resetBtn = document.getElementById('reset-btn');

        // Dynamisches Laden der cache.json von GitHub
        async function loadNadesFromJSON() {
            try {
                // Timestamp ?v=... verhindert Browser-Caching von alten Versionen
                const response = await fetch(`cache.json?v=${Date.now()}`);
                if (response.ok) {
                    nadesData = await response.json();
                    renderTargetPins();
                } else {
                    console.error("Konnte cache.json nicht laden:", response.status);
                }
            } catch (err) {
                console.error("Fehler beim Abrufen der JSON:", err);
            }
        }

        function setSideFilter(side) {
            currentSide = side;
            if(side === 'T') {
                document.getElementById('btn-side-t').classList.add('active');
                document.getElementById('btn-side-ct').classList.remove('active');
            } else {
                document.getElementById('btn-side-ct').classList.add('active');
                document.getElementById('btn-side-t').classList.remove('active');
            }
            renderTargetPins();
        }

        function setNadeTypeFilter(type, btnElement) {
            currentType = type;
            document.querySelectorAll('.filter-box .filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderTargetPins();
        }

        function renderTargetPins() {
            document.querySelectorAll('.target-pin, .throw-pin').forEach(p => p.remove());
            resetBtn.style.display = 'none';

            nadesData.forEach(nade => {
                if (!nade.throws) return;
                const validThrowsForSide = nade.throws.filter(t => t.side === currentSide);

                if (nade.type === currentType && validThrowsForSide.length > 0) {
                    const pin = document.createElement('div');
                    pin.className = 'target-pin';
                    pin.style.top = nade.targetPosition.top + '%';
                    pin.style.left = nade.targetPosition.left + '%';
                    pin.innerText = validThrowsForSide.length;
                    pin.title = `${nade.title} (${validThrowsForSide.length} Wurfoptionen)`;

                    pin.onclick = () => showThrowPinsForTarget(nade, validThrowsForSide);
                    radarBox.appendChild(pin);
                }
            });

            // Aktualisiere Badges basierend auf der aktuellen Seite (T/CT)
            document.getElementById('smoke-count').innerText = nadesData.filter(n => n.type === 'smoke' && n.throws && n.throws.some(t => t.side === currentSide)).length;
            document.getElementById('molotov-count').innerText = nadesData.filter(n => n.type === 'molotov' && n.throws && n.throws.some(t => t.side === currentSide)).length;
            document.getElementById('flash-count').innerText = nadesData.filter(n => n.type === 'flash' && n.throws && n.throws.some(t => t.side === currentSide)).length;
            document.getElementById('he-count').innerText = nadesData.filter(n => n.type === 'he' && n.throws && n.throws.some(t => t.side === currentSide)).length;
        }

        function showThrowPinsForTarget(nade, validThrows) {
            document.querySelectorAll('.target-pin').forEach(p => p.remove());

            validThrows.forEach(t => {
                const throwPin = document.createElement('div');
                throwPin.className = 'throw-pin';
                throwPin.style.top = t.throwPosition.top + '%';
                throwPin.style.left = t.throwPosition.left + '%';
                throwPin.innerHTML = '🏃';
                throwPin.title = `Wurf von ${t.from} (${t.technique})`;

                throwPin.onclick = () => openMediaModal(nade, t);
                radarBox.appendChild(throwPin);
            });

            resetBtn.style.display = 'block';
        }

        function resetRadarView() {
            renderTargetPins();
        }

        // Unterstützt sowohl Videos (videoUrl) als auch Screenshots (imageUrl)
        function openMediaModal(nade, throwObj) {
            document.getElementById('modal-title').innerText = `${nade.title} (Von ${throwObj.from})`;
            const contentContainer = document.getElementById('modal-content');
            
            let mediaElement = '';
            
            if (throwObj.videoUrl) {
                mediaElement = `
                    <div class="video-container">
                        <video id="active-video" controls autoplay loop muted playsinline>
                            <source src="${throwObj.videoUrl}" type="video/mp4">
                            Dein Browser unterstützt kein HTML5-Video.
                        </video>
                    </div>`;
            } else if (throwObj.imageUrl) {
                mediaElement = `
                    <div class="video-container">
                        <img src="${throwObj.imageUrl}" alt="Lineup Screenshot" style="width:100%; height:100%; object-fit:contain;">
                    </div>`;
            } else {
                mediaElement = `<p style="text-align:center; padding: 20px;">Keine Medien für dieses Lineup vorhanden.</p>`;
            }

            contentContainer.innerHTML = `
                <div class="throw-option">
                    <div class="throw-header">
                        <strong style="font-size:1.2rem; color:#fff;">🏃 Von ${throwObj.from}</strong>
                        <span class="technique-badge">${throwObj.technique}</span>
                    </div>
                    ${mediaElement}
                </div>
            `;

            document.getElementById('modal-overlay').classList.add('active');

            const videoEl = document.getElementById('active-video');
            if (videoEl) {
                videoEl.load();
                let playPromise = videoEl.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay wurde blockiert:", error);
                    });
                }
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('modal-content').innerHTML = '';
        }

        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        };

        // Beim ersten Aufruf direkt JSON laden
        document.addEventListener("DOMContentLoaded", loadNadesFromJSON);
    </script>
</body>
</html>
