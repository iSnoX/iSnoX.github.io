<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>Cache - CS2 Nades</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0e1013;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* Linke Seitenleiste */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #171a21;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border: 1px solid #222731;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .back-link {
            color: #8f9cae;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        .map-header h1 {
            margin: 5px 0 0 0;
            font-size: 1.8rem;
        }

        .filter-box {
            background: #1e222d;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #2a303d;
        }

        .filter-title {
            font-size: 0.75rem;
            color: #8f9cae;
            text-transform: uppercase;
            font-weight: bold;
            padding: 8px 12px;
        }

        .filter-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 4px;
            background: transparent;
            color: #c3cddb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: #282e3d; color: #fff; }
        .filter-btn.active { background: #2e3547; color: #fff; }

        .badge {
            background: #121418;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #8f9cae;
        }

        .submit-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 12px 14px;
            background: #ffb400;
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .submit-btn:hover { background: #e09e00; transform: translateY(-1px); }

        /* Rechter Radar-Bereich */
        .map-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121418;
            border: 1px solid #222731;
            border-radius: 16px;
            padding: 20px;
            height: calc(100vh - 40px);
            position: relative;
        }

        .radar-box {
            position: relative;
            display: inline-block;
        }

        .radar-img {
            height: 75vh;
            width: auto;
            max-width: 100%;
            display: block;
            border-radius: 12px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }

        /* Target Pins auf dem Radar */
        .target-pin {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #ffb400;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            transition: transform 0.2s ease;
        }
        .target-pin:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 10;
        }

        /* Throw Pins (Abwurforte, dynamisch angezeigt) */
        .throw-pin {
            position: absolute;
            width: 26px;
            height: 26px;
            background: #2ed573;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.8);
            z-index: 5;
        }

        /* Pop-up Modal für Video & Wurfvarianten */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: #171a21;
            border: 1px solid #2a303d;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: #8f9cae;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .modal-close:hover { color: #fff; }

        .throw-option {
            background: #1e222d;
            border: 1px solid #2a303d;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .throw-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .technique-badge {
            background: #ffb400;
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            margin-top: 10px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Linke Seitenleiste -->
    <aside class="sidebar">
        <div>
            <a href="index.html" class="back-link">← Zurück zur Übersicht</a>
            <div class="map-header">
                <h1>Cache</h1>
            </div>
        </div>

        <!-- Filter-Boxen -->
        <div class="filter-box">
            <div class="filter-title">Nades</div>
            <button class="filter-btn active">
                <span>💨 Smokes</span>
                <span class="badge" id="smoke-count">0</span>
            </button>
            <button class="filter-btn">
                <span>🔥 Molotovs</span>
                <span class="badge">0</span>
            </button>
            <button class="filter-btn">
                <span>⚡ Flashbangs</span>
                <span class="badge">0</span>
            </button>
            <button class="filter-btn">
                <span>💣 HE Grenades</span>
                <span class="badge">0</span>
            </button>
        </div>

        <a href="submit.html" class="submit-btn">+ Submit Nade</a>

        <div class="filter-box">
            <div class="filter-title">Maps</div>
            <a href="mirage.html" class="filter-btn" style="text-decoration:none;">Mirage</a>
            <a href="dust2.html" class="filter-btn" style="text-decoration:none;">Dust 2</a>
            <a href="inferno.html" class="filter-btn" style="text-decoration:none;">Inferno</a>
            <a href="ancient.html" class="filter-btn" style="text-decoration:none;">Ancient</a>
            <a href="anubis.html" class="filter-btn" style="text-decoration:none;">Anubis</a>
            <a href="overpass.html" class="filter-btn" style="text-decoration:none;">Overpass</a>
        </div>
    </aside>

    <!-- Radar-Bereich -->
    <main class="map-container">
        <div class="radar-box" id="radar-box">
            <img src="assets/images/cache-radar.webp" alt="Cache Radar" class="radar-img">
            <!-- Pins werden dynamisch aus der nadesData Liste gerendert -->
        </div>
    </main>

    <!-- Modal Fenster für Video-Anzeige -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" style="margin-top:0; color:#ffb400;">Zielort</h2>
            <div id="modal-throws-list"></div>
        </div>
    </div>

    <script>
        // --- DEINE DATENBANK / DEINE NADE-LISTE ---
        // Hier fügst du einfach neue Nades ein!
        const nadesData = [
            {
                id: "target-1",
                title: "A Main Smoke",
                type: "smoke",
                targetPosition: { top: 38, left: 45 },
                throws: [
                    {
                        from: "T-Spawn",
                        technique: "Jump Throw",
                        youtubeUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                        throwPosition: { top: 82, left: 20 }
                    },
                    {
                        from: "Garagentor / Garage",
                        technique: "W + Jump Throw",
                        youtubeUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                        throwPosition: { top: 70, left: 35 }
                    }
                ]
            },
            {
                id: "target-2",
                title: "B Site Cross Smoke",
                type: "smoke",
                targetPosition: { top: 62, left: 52 },
                throws: [
                    {
                        from: "B Halls",
                        technique: "Left Click (Normal)",
                        youtubeUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                        throwPosition: { top: 78, left: 75 }
                    }
                ]
            }
        ];

        const radarBox = document.getElementById('radar-box');

        // Pins auf der Karte anzeigen
        function renderPins() {
            let smokeCount = 0;

            nadesData.forEach(nade => {
                if (nade.type === 'smoke') smokeCount++;

                // Target Pin (Landeort) erstellen
                const pin = document.createElement('div');
                pin.className = 'target-pin';
                pin.style.top = nade.targetPosition.top + '%';
                pin.style.left = nade.targetPosition.left + '%';
                pin.innerText = nade.throws.length; // Zeigt Anzahl der Wurfvarianten an
                pin.title = `${nade.title} (${nade.throws.length} Wurfoptionen)`;

                pin.onclick = () => openModal(nade);
                radarBox.appendChild(pin);
            });

            document.getElementById('smoke-count').innerText = smokeCount;
        }

        // Pop-up Fenster mit den Videos öffnen
        function openModal(nade) {
            document.getElementById('modal-title').innerText = `🎯 ${nade.title}`;
            const listContainer = document.getElementById('modal-throws-list');
            listContainer.innerHTML = '';

            // Zeige alle Abwurforte und eingebetteten YouTube-Videos für dieses Ziel
            nade.throws.forEach((t, index) => {
                const throwEl = document.createElement('div');
                throwEl.className = 'throw-option';
                throwEl.innerHTML = `
                    <div class="throw-header">
                        <strong style="font-size:1.1rem; color:#fff;">🏃 Wurf #${index + 1}: Von ${t.from}</strong>
                        <span class="technique-badge">${t.technique}</span>
                    </div>
                    <div class="video-container">
                        <iframe src="${t.youtubeUrl}" allowfullscreen></iframe>
                    </div>
                `;
                listContainer.appendChild(throwEl);
            });

            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            // Stoppt die YouTube-Videos beim Schließen des Fensters
            document.getElementById('modal-throws-list').innerHTML = '';
        }

        // Klick außerhalb des Modals schließt es ebenfalls
        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        };

        renderPins();
    </script>
</body>
</html>
