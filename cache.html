<!DOCTYPE HTML>
<html lang="de">
<head>
    <title>Cache - CS2 Nades</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0e1013;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* Linke Seitenleiste */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #171a21;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border: 1px solid #222731;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .back-link {
            color: #8f9cae;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        .map-header h1 {
            margin: 5px 0 0 0;
            font-size: 1.8rem;
        }

        .filter-box {
            background: #1e222d;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #2a303d;
        }

        .filter-title {
            font-size: 0.75rem;
            color: #8f9cae;
            text-transform: uppercase;
            font-weight: bold;
            padding: 8px 12px;
        }

        .filter-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 4px;
            background: transparent;
            color: #c3cddb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: #282e3d; color: #fff; }
        .filter-btn.active { background: #2e3547; color: #fff; }

        .badge {
            background: #121418;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #8f9cae;
        }

        .submit-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 12px 14px;
            background: #ffb400;
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .submit-btn:hover { background: #e09e00; transform: translateY(-1px); }

        /* Rechter Radar-Bereich */
        .map-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121418;
            border: 1px solid #222731;
            border-radius: 16px;
            padding: 20px;
            height: calc(100vh - 40px);
            position: relative;
        }

        .radar-box {
            position: relative;
            display: inline-block;
        }

        .radar-img {
            height: 75vh;
            width: auto;
            max-width: 100%;
            display: block;
            border-radius: 12px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }

        /* Target Pins auf dem Radar */
        .target-pin {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #ffb400;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            transition: transform 0.2s ease;
        }
        .target-pin:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 10;
        }

        /* Pop-up Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: #171a21;
            border: 1px solid #2a303d;
            border-radius: 16px;
            width: 96vw;
            height: 96vh;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.95);
            position: relative;
        }

        .modal-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #8f9cae;
            font-size: 1.8rem;
            line-height: 1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { color: #fff; background: rgba(255, 255, 255, 0.2); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Mini-Radar Ansicht im Modal für den Abwurf-Ort */
        .modal-radar-container {
            position: relative;
            width: 100%;
            height: 70vh;
            background: #121418;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #2a303d;
        }

        .modal-radar-img {
            height: 100%;
            width: auto;
            max-width: 100%;
            display: block;
            border-radius: 8px;
        }

        /* Abwurf-Pin auf dem Modal-Radar */
        .throw-pin {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
            transition: transform 0.2s ease;
        }
        .throw-pin:hover {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 10;
        }

        .throw-option {
            background: #1e222d;
            border: 1px solid #2a303d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .throw-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .technique-badge {
            background: #ffb400;
            color: #000;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 65vh;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            border: 0;
        }

        .back-to-radar-btn {
            background: #2a303d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            align-self: flex-start;
            transition: background 0.2s;
        }
        .back-to-radar-btn:hover { background: #3b4252; }
    </style>
</head>
<body>

    <!-- Linke Seitenleiste -->
    <aside class="sidebar">
        <div>
            <a href="index.html" class="back-link">← Zurück zur Übersicht</a>
            <div class="map-header">
                <h1>Cache</h1>
            </div>
        </div>

        <!-- Filter-Boxen -->
        <div class="filter-box">
            <div class="filter-title">Nades</div>
            <button class="filter-btn active">
                <span>💨 Smokes</span>
                <span class="badge" id="smoke-count">0</span>
            </button>
            <button class="filter-btn">
                <span>🔥 Molotovs</span>
                <span class="badge">0</span>
            </button>
            <button class="filter-btn">
                <span>⚡ Flashbangs</span>
                <span class="badge">0</span>
            </button>
            <button class="filter-btn">
                <span>💣 HE Grenades</span>
                <span class="badge">0</span>
            </button>
        </div>

        <a href="submit.html" class="submit-btn">+ Submit Nade</a>

        <div class="filter-box">
            <div class="filter-title">Maps</div>
            <a href="mirage.html" class="filter-btn" style="text-decoration:none;">Mirage</a>
            <a href="dust2.html" class="filter-btn" style="text-decoration:none;">Dust 2</a>
            <a href="inferno.html" class="filter-btn" style="text-decoration:none;">Inferno</a>
            <a href="ancient.html" class="filter-btn" style="text-decoration:none;">Ancient</a>
            <a href="anubis.html" class="filter-btn" style="text-decoration:none;">Anubis</a>
            <a href="overpass.html" class="filter-btn" style="text-decoration:none;">Overpass</a>
        </div>
    </aside>

    <!-- Radar-Bereich -->
    <main class="map-container">
        <div class="radar-box" id="radar-box">
            <img src="assets/images/cache-radar.webp" alt="Cache Radar" class="radar-img">
        </div>
    </main>

    <!-- Modal Fenster -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header-area">
                <h2 id="modal-title" style="margin:0; color:#ffb400; font-size:1.8rem;">Zielort</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-content"></div>
        </div>
    </div>

    <script>
        const nadesData = [
            {
                id: "target-1784803370819",
                title: "Cache Smoke: Back A Site",
                type: "smoke",
                targetPosition: { top: 21.4, left: 29.4 },
                throws: [
                    {
                        from: "Outside Garage",
                        technique: "Jump Throw",
                        videoUrl: "assets/videos/cache-smoke-1.mp4",
                        throwPosition: { top: 46.8, left: 67.0 }
                    }
                ]
            }
        ];

        const radarBox = document.getElementById('radar-box');

        function renderPins() {
            let smokeCount = 0;

            nadesData.forEach(nade => {
                if (nade.type === 'smoke') smokeCount++;

                const pin = document.createElement('div');
                pin.className = 'target-pin';
                pin.style.top = nade.targetPosition.top + '%';
                pin.style.left = nade.targetPosition.left + '%';
                pin.innerText = nade.throws.length;
                pin.title = `${nade.title} (${nade.throws.length} Wurfoptionen)`;

                pin.onclick = () => openTargetModal(nade);
                radarBox.appendChild(pin);
            });

            document.getElementById('smoke-count').innerText = smokeCount;
        }

        // Schritt 1: Zielort geklickt -> Zeige Abwurf-Pins auf dem Modal-Radar
        function openTargetModal(nade) {
            document.getElementById('modal-title').innerText = `🎯 Wähle den Abwurf-Ort für: ${nade.title}`;
            const contentContainer = document.getElementById('modal-content');
            contentContainer.innerHTML = '';

            const radarContainer = document.createElement('div');
            radarContainer.className = 'modal-radar-container';

            const radarImg = document.createElement('img');
            radarImg.src = 'assets/images/cache-radar.webp';
            radarImg.className = 'modal-radar-img';
            radarContainer.appendChild(radarImg);

            nade.throws.forEach((t, index) => {
                const throwPin = document.createElement('div');
                throwPin.className = 'throw-pin';
                throwPin.style.top = t.throwPosition.top + '%';
                throwPin.style.left = t.throwPosition.left + '%';
                throwPin.innerHTML = '🏃';
                throwPin.title = `Wurf von ${t.from} (${t.technique})`;

                // Schritt 2: Abwurf-Pin geklickt -> Zeige Video
                throwPin.onclick = () => showVideoView(nade, t);
                radarContainer.appendChild(throwPin);
            });

            contentContainer.appendChild(radarContainer);
            document.getElementById('modal-overlay').classList.add('active');
        }

        // Schritt 3: Video anzeigen nach Klick auf Abwurf-Pin (mit erzwungenem Start)
        function showVideoView(nade, throwObj) {
            document.getElementById('modal-title').innerText = `📹 ${nade.title} (Von ${throwObj.from})`;
            const contentContainer = document.getElementById('modal-content');
            contentContainer.innerHTML = '';

            const backBtn = document.createElement('button');
            backBtn.className = 'back-to-radar-btn';
            backBtn.innerText = '← Zurück zur Abwurf-Übersicht';
            backBtn.onclick = () => openTargetModal(nade);
            contentContainer.appendChild(backBtn);

            const throwEl = document.createElement('div');
            throwEl.className = 'throw-option';
            throwEl.innerHTML = `
                <div class="throw-header">
                    <strong style="font-size:1.25rem; color:#fff;">🏃 Von ${throwObj.from}</strong>
                    <span class="technique-badge">${throwObj.technique}</span>
                </div>
                <div class="video-container">
                    <video autoplay loop muted playsinline>
                        <source src="${throwObj.videoUrl}" type="video/mp4">
                        Dein Browser unterstützt kein HTML5-Video.
                    </video>
                </div>
            `;
            contentContainer.appendChild(throwEl);

            // Erzwingt das Laden und Abspielen, damit der Bildschirm nicht schwarz bleibt
            const videoEl = throwEl.querySelector('video');
            videoEl.load();
            videoEl.play().catch(error => {
                console.log("Autoplay wurde vom Browser blockiert oder Video lädt noch:", error);
            });
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('modal-content').innerHTML = '';
        }

        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        };

        renderPins();
    </script>
</body>
</html>
